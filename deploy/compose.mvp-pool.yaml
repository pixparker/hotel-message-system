name: mvp-hotel-message

# MVP-pool deploy: connects to the shared Caddy + Postgres + Redis running
# under /srv/infra. Does NOT include its own proxy/db/cache.
#
# Expected layout on server:
#   /srv/apps/hotel-message/
#     repo/         # this repo (cloned)
#     .env          # per-MVP env (gitignored; written by clientora deploy)
#   (compose.yaml is this file; mount --project-directory at repo root)

networks:
  edge:
    name: clientora_edge
    external: true
  data:
    name: clientora_data
    external: true

services:
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    image: mvp-hotel-message-api:latest
    restart: unless-stopped
    env_file: ../../.env
    environment:
      NODE_ENV: production
    networks:
      - edge
      - data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.worker
    image: mvp-hotel-message-worker:latest
    restart: unless-stopped
    env_file: ../../.env
    environment:
      NODE_ENV: production
    networks:
      - data

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    image: mvp-hotel-message-web:latest
    restart: unless-stopped
    networks:
      - edge
