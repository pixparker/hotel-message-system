name: hotel-message

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hms
      POSTGRES_PASSWORD: hms
      POSTGRES_DB: hms
    ports:
      - "5432:5432"
    volumes:
      - hms_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hms"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - hms_redisdata_dev:/data

volumes:
  hms_pgdata_dev:
  hms_redisdata_dev:
